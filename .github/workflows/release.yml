name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Build Linux binaries
        run: |
          cd packages/cli
          mkdir -p binaries
          bun run build:linux-x64
          bun run build:linux-arm64

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-linux
          path: |
            packages/cli/binaries/viwo-linux-x64
            packages/cli/binaries/viwo-linux-arm64

  build-macos-x64:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Build macOS x64 binary
        run: |
          cd packages/cli
          mkdir -p binaries
          bun run build:macos-x64

      - name: Upload macOS x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-macos-x64
          path: packages/cli/binaries/viwo-macos-x64

  build-macos-arm64:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Build macOS arm64 binary
        run: |
          cd packages/cli
          mkdir -p binaries
          bun run build:macos-arm64

      - name: Upload macOS arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-macos-arm64
          path: packages/cli/binaries/viwo-macos-arm64

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install

      - name: Build Windows binary
        shell: bash
        run: |
          cd packages/cli
          mkdir -p binaries
          bun run build:windows-x64

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-windows
          path: packages/cli/binaries/viwo-windows-x64.exe

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos-x64
      - build-macos-arm64
      - build-windows

    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-*
          merge-multiple: true
          path: packages/cli/binaries

      - name: Create checksums
        run: |
          cd packages/cli/binaries
          sha256sum viwo-linux-x64 > viwo-linux-x64.sha256
          sha256sum viwo-linux-arm64 > viwo-linux-arm64.sha256
          sha256sum viwo-macos-x64 > viwo-macos-x64.sha256
          sha256sum viwo-macos-arm64 > viwo-macos-arm64.sha256
          sha256sum viwo-windows-x64.exe > viwo-windows-x64.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/cli/binaries/viwo-linux-x64
            packages/cli/binaries/viwo-linux-x64.sha256
            packages/cli/binaries/viwo-linux-arm64
            packages/cli/binaries/viwo-linux-arm64.sha256
            packages/cli/binaries/viwo-macos-x64
            packages/cli/binaries/viwo-macos-x64.sha256
            packages/cli/binaries/viwo-macos-arm64
            packages/cli/binaries/viwo-macos-arm64.sha256
            packages/cli/binaries/viwo-windows-x64.exe
            packages/cli/binaries/viwo-windows-x64.exe.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GH_RELEASE_TOKEN }}
